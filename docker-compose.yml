services:
  # Local PostgreSQL database container (optional if using Supabase Cloud)
  db:
    image: postgres:15-alpine
    container_name: logmymeal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: logmymeal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=32MB
      -c max_connections=20
      -c effective_cache_size=64MB
      -c statement_timeout=10000
    mem_limit: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node/Prisma Backend Express Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logmymeal-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_OPTIONS=--max-old-space-size=200
      # Change this to your Supabase DATABASE_URL if you want to sync with cloud Postgres
      - DATABASE_URL=postgresql://postgres:password123@db:5432/logmymeal?schema=public
    depends_on:
      - db
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Frontend Client App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    container_name: logmymeal-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
      - NODE_OPTIONS=--max-old-space-size=200
    depends_on:
      - backend
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
